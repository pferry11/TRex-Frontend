<!DOCTYPE html>
<html>
<head>
    <title>TRex Dashboard</title>
    <style>

        #durationInput[disabled] {
    background-color: #f0f0f0;
    color: #666;
    cursor: not-allowed;
}

#durationInput.infinity::placeholder {
    color: #666;
    font-size: 18px;
    text-align: center;
}
.value-cell {
    text-align: right;
    width: 140px;
}	
	
.controls-bar {
    background: #1a1a1a;
    padding: 15px 20px;
    border-bottom: 2px solid #333;
    border-radius: 0 0 8px 8px; /* rounded bottom corners */
    display: flex;
    gap: 10px;
    justify-content: flex-start;
    align-items: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4); /* subtle depth */
    flex-wrap: wrap;
}

.controls-bar button {
    background: #2a2a2a;
    color: #fff;
    border: 1px solid #444;
    padding: 10px 22px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 15px;
    transition: background 0.2s, transform 0.1s;
}

.controls-bar button:hover {
    background: #3a3a3a;
}

.controls-bar button:active {
    transform: scale(0.97);
}

.controls-bar button:disabled {
    background: #1a1a1a;
    color: #666;
    cursor: not-allowed;
    border: 1px solid #333;
}

.row-3col {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
    padding: 20px;
}
	.value-cell {
    text-align: right;
    width: 120px;
}

.fade {
    animation: subtlePulse 0.25s ease-out;
}

@keyframes subtlePulse {
    0%   { opacity: 0.85; }
    100% { opacity: 1; }
}


        /* Status colours */
        .status-ok { color: #4caf50; }
        .status-idle { color: #888; }
        .status-warn { color: #ff9800; }

        /* Icons */
        .icon { margin-right: 6px; opacity: 0.8; }



        /* Layout */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0d0d0d;
            color: #e0e0e0;
        }

        header {
            background: #1a1a1a;
            padding: 15px;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            border-bottom: 2px solid #333;
        }

        .running-banner {
            background: #0f3;
            color: #000;
            text-align: center;
            padding: 10px;
            font-weight: bold;
            display: none;
        }

        .container {
            display: flex;
            padding: 20px;
            gap: 20px;
        }

        .panel {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 8px;
            flex: 1;
        }

        .controls button {
            background: #333;
            color: #fff;
            border: none;
            padding: 10px 20px;
            margin-right: 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        .controls button:hover { background: #444; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        table td {
            padding: 6px;
            border-bottom: 1px solid #333;
        }

        .placeholder {
            margin: 20px;
            padding: 40px;
            background: #1a1a1a;
            border-radius: 8px;
            text-align: center;
            color: #555;
            font-style: italic;
        }

        .link-up { color: #4caf50; font-weight: bold; }
        .link-down { color: #f44336; font-weight: bold; }
        .raw-heading { color: #4dabf7; font-weight: bold; }
        .raw-zero { color: #4caf50; }
        .raw-positive { color: #f44336; }

        .raw-view {
            font-family: Consolas, "Liberation Mono", Menlo, monospace;
            white-space: pre;
            color: #d8d8d8;
            background: #111;
            padding: 18px;
            border-radius: 8px;
            min-height: 360px;
            overflow-x: auto;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<header>TRex Traffic Dashboard</header>
<div id="healthStatus" style="text-align:center; padding:8px; font-weight:bold;"></div>

<div id="runningBanner" class="running-banner">TRAFFIC RUNNING</div>

<div class="controls-bar">

    <!-- Connection inputs -->
    <div style="width:100%; margin-bottom:10px; display:flex; gap:10px; align-items:center;">
        <input id="hostnameInput" type="text" placeholder="Hostname/IP" style="width:120px;">
        <input id="portInput" type="number" placeholder="Port" value="8000" style="width:80px;">
        <button id="connectBtn" onclick="connect()">Connect</button>
        <button id="disconnectBtn" onclick="disconnect()" style="display:none;">Disconnect</button>
    </div>

    <!-- Second row: Profile, Rate, Ports -->
    <div style="width:100%; margin-bottom:10px; display:flex; gap:10px; align-items:center;">
    <!-- Profile selector -->
    <select id="profileSelect" disabled>
        <option value="/opt/Trex/3.06/stl/udp_1pkt.py">UDP 1 Packet</option>
        <option value="/opt/Trex/3.06/stl/udp_9k.py">UDP 9K</option>
        <option value="/opt/Trex/3.06/stl/custom_profile.py">Custom Profile</option>
    </select>

<!-- Rate -->
<div style="display:flex; gap:6px; align-items:center;">
    <input id="rateValue" type="number" min="1" value="1" style="width:80px;" disabled>
    
    <select id="rateUnit" style="width:90px;" disabled>
        <option value="pps">pps</option>
        <option value="kpps">kpps</option>
        <option value="mpps" selected>mpps</option>
        <option value="gbps">gbps</option>
        <option value="%">%</option>
    </select>
</div>

    <!-- Ports -->
    <input id="portsInput" type="text" placeholder="Ports (e.g. 0,1)" style="width:100px;" disabled>

    <!-- Duration -->
    <input id="durationInput" type="number" placeholder="Duration (sec)" style="width:120px;" disabled>
        <label class="toggle">
            <input type="checkbox" id="continuousToggle" disabled>
            <span>Continuous Mode</span>
        </label>

    <!-- Buttons -->
    <button onclick="startTraffic()" disabled>Start</button>
    <button onclick="stopTraffic()" disabled>Stop</button>
    <button id="toggleViewBtn" onclick="toggleViewMode()">Raw View</button>
    </div>
</div>

<div id="summaryView">
    <div class="row-3col">
        <!-- System Info Panel -->
        <div class="panel" id="systemInfo">
            <h3>System Info</h3>
            <table id="systemTable"></table>
        </div>
        <!-- Port 0 Stats -->
        <div class="panel">
            <h3>Port 0 <span id="link0"></span></h3>
            <table id="stats0"></table>
        </div>
        <!-- Port 1 Stats -->
        <div class="panel">
            <h3>Port 1 <span id="link1"></span></h3>
            <table id="stats1"></table>
        </div>
    </div>
</div>
<div id="rawView" style="display:none;">
        <div class="panel">
            <h3>Raw TRex Stats</h3>
            <pre id="rawStatsPre" class="raw-view"></pre>
        </div>
    </div>

<div class="placeholder">Graphs will go here in V3</div>

<script>

let baseUrl = null;
let healthInterval = null;
let statsInterval = null;

async function checkHealth() {
    if (!baseUrl) return;
    try {
        const res = await fetch(`${baseUrl}/health`);
        const data = await res.json();

        const trexUp =
            data.trex_process === "running" &&
            (data.trex_rpc === "ok" || data.trex_rpc === "reconnected");

        if (trexUp) {
            healthStatus.innerHTML = "🟢 TRex Running";
            healthStatus.style.color = "#4caf50";
            setControlsEnabled(true);
        } 
        else if (data.trex_process === "running") {
            healthStatus.innerHTML = "🟡 TRex Running (RPC Error)";
            healthStatus.style.color = "#ff9800";
            setControlsEnabled(false);
        } 
        else {
            healthStatus.innerHTML = "🔴 TRex Not Running";
            healthStatus.style.color = "#f44336";
            setControlsEnabled(false);
        }

    } catch {
        healthStatus.innerHTML = "🔴 Backend Offline";
        healthStatus.style.color = "#f44336";
        setControlsEnabled(false);
    }
}

function connect() {
    const hostname = document.getElementById("hostnameInput").value.trim();
    const port = document.getElementById("portInput").value.trim();
    if (!hostname || !port) {
        alert("Please enter hostname/IP and port.");
        return;
    }
    baseUrl = `http://${hostname}:${port}`;
    document.getElementById("connectBtn").style.display = "none";
    document.getElementById("disconnectBtn").style.display = "inline-block";
    document.getElementById("hostnameInput").disabled = true;
    document.getElementById("portInput").disabled = true;
    healthInterval = setInterval(checkHealth, 3000);
    statsInterval = setInterval(updateStats, 1000);
    checkHealth();
    updateStats();
}

function disconnect() {
    clearInterval(healthInterval);
    clearInterval(statsInterval);
    baseUrl = null;
    healthStatus.innerHTML = "";
    document.getElementById("connectBtn").style.display = "inline-block";
    document.getElementById("disconnectBtn").style.display = "none";
    document.getElementById("hostnameInput").disabled = false;
    document.getElementById("portInput").disabled = false;
    setControlsEnabled(false);
}

let lastStats = { 0: {}, 1: {} };
let trafficTimeout = null;

/* ----------------------------------------------------------
   NEW startTraffic() — sends STL profile correctly
--------------------------------------------------------- */
async function startTraffic() {
    if (!baseUrl) return;

    // 1. Get selected STL profile path
    const profileSelect = document.getElementById("profileSelect");
    const profilePath = profileSelect.value;   // e.g. "/opt/Trex/3.06/stl/imix.py"

    if (!profilePath) {
        alert("No profile selected.");
        return;
    }

    // 2. Build rate string
    const rateValue = document.getElementById("rateValue").value.trim();
    const rateUnit = document.getElementById("rateUnit").value;
    let rate = rateValue ? rateValue + rateUnit : undefined;

    // 3. Duration / continuous mode
    const durationInput = document.getElementById("durationInput").value.trim();
    const continuous = document.getElementById("continuousToggle").checked;
    const duration = continuous ? null : (durationInput ? Number(durationInput) : null);

    // 4. Ports
    const portsInput = document.getElementById("portsInput").value.trim();
    const ports = portsInput
        ? portsInput.split(",").map(p => Number(p.trim()))
        : undefined;

    // 5. Build JSON body
    const body = {
        rate: rate,
        duration: duration,
        ports: ports
    };

    Object.keys(body).forEach(k => body[k] === undefined && delete body[k]);

    try {
        // 6. Send POST with profile in query string
        const res = await fetch(`${baseUrl}/start?profile=${encodeURIComponent(profilePath)}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
        });

        const data = await res.json();
        console.log("Start response:", data);

    } catch (err) {
        console.error("Start error:", err);
    }
}

async function stopTraffic() {
    if (!baseUrl) return;
    try {
        await fetch(`${baseUrl}/stop`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({})
        });
    } catch (err) {
        console.error("Stop error:", err);
    }
}

function formatNumber(n) {
    if (typeof n !== "number") return n;
    return Math.round(n).toLocaleString();
}
function formatFloat(n, decimals = 2) {
    if (typeof n !== "number") return n;
    return n.toFixed(decimals);
}

function iconUp() { return `<span class="icon">⬆️</span>`; }
function iconDown() { return `<span class="icon">⬇️</span>`; }

async function updateStats() {
    if (!baseUrl) return;
    try {
        const res = await fetch(`${baseUrl}/stats`);
        const data = await res.json();

        updatePort(0, data["0"]);
        updatePort(1, data["1"]);
        updateSystemInfo(data["global"]);
        updateRawStats(data);

        const running = data["0"].tx_pps > 100 || data["1"].tx_pps > 100;

        if (running) {
            document.getElementById("runningBanner").style.display = "block";

            clearTimeout(trafficTimeout);
            trafficTimeout = setTimeout(() => {
                document.getElementById("runningBanner").style.display = "none";
            }, 2000);
        }

    } catch (e) {
        console.log("Stats error:", e);
    }
}

function updateRawStats(data) {
    const rawPre = document.getElementById("rawStatsPre");
    if (!rawPre) return;

    if (!data) {
        rawPre.textContent = "No raw stats available";
        return;
    }

    const g = data.global || {};
    const p0 = data["0"] || {};
    const p1 = data["1"] || {};
    const total = (key) => {
        const a = Number(p0[key] || 0);
        const b = Number(p1[key] || 0);
        return a + b;
    };

    const format = (value) => value === undefined || value === null ? "-" : String(value);
    const labelWidth = 10;
    const portWidth = 25;
    const pad = (value, width = labelWidth, align = "left") => {
        const text = format(value);
        if (align === "right") return text.padStart(width);
        if (align === "center") {
            const diff = width - text.length;
            const left = Math.floor(diff / 2);
            const right = diff - left;
            return " ".repeat(left) + text + " ".repeat(right);
        }
        return text.padEnd(width);
    };
    const escapeHtml = (text) => String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    const wrap = (value, className) => `<span class="${className}">${escapeHtml(value)}</span>`;
    const separator = () => `${pad("", labelWidth, "left").replace(/./g, " ")} |${pad("", portWidth, "left").replace(/./g, " ")} |${pad("", portWidth, "left").replace(/./g, " ")} |${pad("", portWidth, "left").replace(/./g, " ")}`;

    const connectionText = baseUrl ? baseUrl.replace(/^https?:\/\//, "") : "-";
    const cpuCores = g.cpu_cores !== undefined ? g.cpu_cores : "?";
    const rxCpuUtil = g.rx_cpu_util !== undefined ? `${g.rx_cpu_util}%` : "-";
    const asyncUtil = g.async_util !== undefined ? `${g.async_util}%` : "-";
    const dropRateVal = Number(g.drop_rate || 0);
    const queueFullVal = Number(g.queue_full || 0);

    const formatMetricValue = (value) => pad(`${format(value)} bps`, 2, "right");
    const formatQueueValue = (value) => pad(`${format(value)} pkts`, 2, "right");

    const lines = [];
    lines.push(`<span class="raw-heading">Global Statistics</span>`);
    lines.push("");
    lines.push(`${escapeHtml(pad(`connection : ${connectionText}`, 40))}${escapeHtml(pad(`total.tx_L1 : ${format(g.total_tx_L1 || 0)} bps`, 40))}`);
    lines.push(`${escapeHtml(pad(`version : ${format(g.version || "STL @ v3.06")}`, 40))}${escapeHtml(pad(`total.tx_L1 : ${format(g.total_tx_L1 || 0)} bps`, 40))}`);
    lines.push(`${escapeHtml(pad(`cpu.util : ${format(g.cpu_util !== undefined ? g.cpu_util + "%" : "0.0%")}`, 40))}${escapeHtml(pad(`total.rx : ${format(g.total_rx || 0)} bps`, 40))}`);
    lines.push(`${escapeHtml(pad(`rx_cpu.util : ${rxCpuUtil}`, 40))}${escapeHtml(pad(`total.pps : ${format(g.total_pps || 0)} pps`, 40))}`);
    lines.push(`${escapeHtml(pad(`async.util : ${asyncUtil}`, 40))}${escapeHtml(`drop_rate : `)}${wrap(formatMetricValue(dropRateVal), dropRateVal === 0 ? "raw-zero" : "raw-positive")}`);
    lines.push(`${escapeHtml(pad(`total.cps : ${format(g.total_cps || 0)} cps`, 40))}${escapeHtml(`queue_full : `)}${wrap(formatQueueValue(queueFullVal), queueFullVal === 0 ? "raw-zero" : "raw-positive")}`);
    lines.push("");
    lines.push(`<span class="raw-heading">Port Statistics</span>`);
    lines.push("");
    lines.push(`${pad("port", labelWidth, "center")} |${pad("0", portWidth, "center")} |${pad("1", portWidth, "center")} |${pad("total", portWidth, "center")}`);
    lines.push(`${pad("", labelWidth, "left").replace(/./g, "-")} +${pad("", portWidth, "left").replace(/./g, "-")} +${pad("", portWidth, "left").replace(/./g, "-")} +${pad("", portWidth, "left").replace(/./g, "-")}`);

    const rows = [
        ["owner", "root", "root", ""],
        ["link", p0.link === true ? "UP" : p0.link === false ? "DOWN" : "-", p1.link === true ? "UP" : p1.link === false ? "DOWN" : "-", ""],
        ["state", format(p0.state || "IDLE"), format(p1.state || "IDLE"), ""],
        ["speed", format(p0.speed || "10 Gb/s"), format(p1.speed || "10 Gb/s"), ""],
        ["cpu.util", format(p0.cpu_util !== undefined ? p0.cpu_util + "%" : "0%"), format(p1.cpu_util !== undefined ? p1.cpu_util + "%" : "0%"), ""],
        ["--", "", "", ""],
        ["Tx bps L2", format(p0.tx_bps || 0) + " bps", format(p1.tx_bps || 0) + " bps", format(total("tx_bps")) + " bps"],
        ["Tx bps L1", format(p0.tx_bps || 0) + " bps", format(p1.tx_bps || 0) + " bps", format(total("tx_bps")) + " bps"],
        ["Tx pps", format(p0.tx_pps || 0) + " pps", format(p1.tx_pps || 0) + " pps", format(total("tx_pps")) + " pps"],
        ["Line Util", format(p0.tx_util !== undefined ? p0.tx_util + "%" : "0%"), format(p1.tx_util !== undefined ? p1.tx_util + "%" : "0%"), ""],
        ["---", "", "", ""],
        ["Rx bps", format(p0.rx_bps || 0) + " bps", format(p1.rx_bps || 0) + " bps", format(total("rx_bps")) + " bps"],
        ["Rx pps", format(p0.rx_pps || 0) + " pps", format(p1.rx_pps || 0) + " pps", format(total("rx_pps")) + " pps"],
        ["----", "", "", ""],
        ["opackets", format(p0.opackets || 0), format(p1.opackets || 0), format(total("opackets"))],
        ["ipackets", format(p0.ipackets || 0), format(p1.ipackets || 0), format(total("ipackets"))],
        ["obytes", format(p0.obytes || 0), format(p1.obytes || 0), format(total("obytes"))],
        ["ibytes", format(p0.ibytes || 0), format(p1.ibytes || 0), format(total("ibytes"))],
        ["tx-pkts", format(p0.tx_pkts || p0.tx_pkts === 0 ? p0.tx_pkts : 0), format(p1.tx_pkts || p1.tx_pkts === 0 ? p1.tx_pkts : 0), ""],
        ["rx-pkts", format(p0.rx_pkts || p0.rx_pkts === 0 ? p0.rx_pkts : 0), format(p1.rx_pkts || p1.rx_pkts === 0 ? p1.rx_pkts : 0), format(total("rx_pkts"))],
        ["tx-bytes", format(p0.tx_bytes || 0), format(p1.tx_bytes || 0), format(total("tx_bytes"))],
        ["rx-bytes", format(p0.rx_bytes || 0), format(p1.rx_bytes || 0), format(total("rx_bytes"))],
        ["-----", "", "", ""],
        ["errors", format(p0.errors || 0), format(p1.errors || 0), format(total("errors"))],
        ["ierrors", format(p0.ierrors || 0), format(p1.ierrors || 0), format(total("ierrors"))]
    ];

    const wrapAlertValue = (label, value, rawValue) => {
        if (label === "errors" || label === "ierrors") {
            return wrap(value, rawValue === 0 ? "raw-zero" : "raw-positive");
        }
        return escapeHtml(value);
    };

    rows.forEach(([label, c0, c1, totalValue, addBlank]) => {
        const c0Raw = label === "errors" ? p0.errors || 0 : label === "ierrors" ? p1.ierrors || 0 : 0;
        const c1Raw = label === "errors" ? p1.errors || 0 : label === "ierrors" ? p1.ierrors || 0 : 0;
        const totalRaw = label === "errors" || label === "ierrors" ? total(label) : 0;
        lines.push(`${escapeHtml(pad(label, labelWidth))} |${wrapAlertValue(label, pad(c0, portWidth, "right"), c0Raw)} |${wrapAlertValue(label, pad(c1, portWidth, "right"), c1Raw)} |${wrapAlertValue(label, pad(totalValue, portWidth, "right"), totalRaw)}`);
        if (addBlank) {
            lines.push(separator());
        }
    });

    rawPre.innerHTML = lines.join("\n");
}

function updatePort(port, stats) {
    if (!stats || Object.keys(stats).length === 0) {
        stats = {
            tx_pps: 0,
            rx_pps: 0,
            tx_bps: 0,
            rx_bps: 0,
            tx_util: 0,
            rx_util: 0,
            link: false
        };
    }
    const table = document.getElementById("stats" + port);
    const link = document.getElementById("link" + port);

    table.innerHTML = "";

    let linkHTML = "";
    if (stats.link === true) {
        linkHTML = `<span class="link-up">🟢 UP</span>`;
    } else if (stats.tx_pps > 0 || stats.rx_pps > 0) {
        linkHTML = `<span class="status-warn">🟡 LOOPBACK</span>`;
    } else {
        linkHTML = `<span class="link-down">🔴 DOWN</span>`;
    }
    link.innerHTML = linkHTML;

    const rows = [
        [iconUp() + "TX PPS", formatNumber(stats.tx_pps), stats.tx_pps > 0],
        [iconDown() + "RX PPS", formatNumber(stats.rx_pps), stats.rx_pps > 0],
        [iconUp() + "TX BPS", formatNumber(stats.tx_bps), stats.tx_bps > 0],
        [iconDown() + "RX BPS", formatNumber(stats.rx_bps), stats.rx_bps > 0],
        ["TX Util (L1)", formatFloat(stats.tx_util, 2), stats.tx_util > 0],
        ["RX Util (L1)", formatFloat(stats.rx_util, 2), stats.rx_util > 0]
    ];

    rows.forEach(([label, value, active], index) => {
        const prev = lastStats[port][index];
        const changed = prev !== value;

        table.innerHTML += `
            <tr>
                <td><b>${label}</b></td>
                <td class="value-cell ${active ? 'status-ok' : 'status-idle'} ${changed ? 'fade' : ''}">
                    ${value}
                </td>
            </tr>
        `;

        lastStats[port][index] = value;
    });
}

function updateSystemInfo(global) {
    const table = document.getElementById("systemTable");
    table.innerHTML = "";

    if (!global || Object.keys(global).length === 0) {
        table.innerHTML = `
            <tr>
                <td colspan="2" style="text-align:center; color:#888; padding:10px;">
                    TRex is offline - no system statistics available
                </td>
            </tr>
        `;
        return;
    }

    const drops = global.err_cntrs ? global.err_cntrs.rx_err : 0;
    const errors = global.err_cntrs ? global.err_cntrs.tx_err : 0;

    const rows = [
        ["CPU Util", formatFloat(global.cpu_util, 1) + "%"],
        ["RX CPU Util", formatFloat(global.rx_cpu_util, 1) + "%"],
        ["TX Packets", formatNumber(global.opackets)],
        ["RX Packets", formatNumber(global.ipackets)],
        ["TX Bytes", formatNumber(global.obytes)],
        ["RX Bytes", formatNumber(global.ibytes)],
        ["Dropped Packets", formatNumber(drops)],
        ["Errors", formatNumber(errors)]
    ];

    rows.forEach(([label, value]) => {
        table.innerHTML += `
            <tr>
                <td><b>${label}</b></td>
                <td class="value-cell fade">${value}</td>
            </tr>
        `;
    });
}

function setControlsEnabled(enabled) {
    document.getElementById("profileSelect").disabled = !enabled;
    document.getElementById("rateValue").disabled = !enabled;
    document.getElementById("rateUnit").disabled = !enabled;
    document.getElementById("durationInput").disabled = !enabled;
    document.getElementById("portsInput").disabled = !enabled;
    document.getElementById("continuousToggle").disabled = !enabled;

    document.querySelectorAll(".controls-bar button:not(#connectBtn):not(#disconnectBtn)").forEach(btn => {
        btn.disabled = !enabled;
        btn.style.opacity = enabled ? "1.0" : "0.4";
        btn.style.cursor = enabled ? "pointer" : "not-allowed";
    });
}

const durationInput = document.getElementById("durationInput");
const continuousToggle = document.getElementById("continuousToggle");

function enableContinuousMode() {
    durationInput.value = "";
    durationInput.disabled = true;
    durationInput.classList.add("infinity");
    durationInput.placeholder = "∞";
    continuousToggle.checked = true;
}

function disableContinuousMode() {
    durationInput.disabled = false;
    durationInput.classList.remove("infinity");
    durationInput.placeholder = "Duration (sec)";

    if (!durationInput.value || Number(durationInput.value) < 1) {
        durationInput.value = 1;
    }
    continuousToggle.checked = false;
}

continuousToggle.addEventListener("change", () => {
    if (continuousToggle.checked) {
        enableContinuousMode();
    } else {
        disableContinuousMode();
    }
});

durationInput.addEventListener("input", () => {
    const val = Number(durationInput.value);

    if (!val || val < 1) {
        enableContinuousMode();
    } else {
        disableContinuousMode();
    }
});

window.addEventListener("DOMContentLoaded", () => {
    enableContinuousMode();
    setControlsEnabled(false);
    const toggleBtn = document.getElementById("toggleViewBtn");
    if (toggleBtn) toggleBtn.textContent = "Raw View";
});

let viewMode = "summary";

function toggleViewMode() {
    const summaryView = document.getElementById("summaryView");
    const rawView = document.getElementById("rawView");
    const toggleBtn = document.getElementById("toggleViewBtn");

    if (viewMode === "summary") {
        viewMode = "raw";
        summaryView.style.display = "none";
        rawView.style.display = "block";
        if (toggleBtn) toggleBtn.textContent = "Summary View";
    } else {
        viewMode = "summary";
        summaryView.style.display = "block";
        rawView.style.display = "none";
        if (toggleBtn) toggleBtn.textContent = "Raw View";
    }
}

</script>

</body>
</html>
